services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SALEOR_API_URL: ${VITE_SALEOR_API_URL}
        VITE_SITE_NAME: ${VITE_SITE_NAME}
        VITE_SHIPROCKET_APP_URL: ${VITE_SHIPROCKET_APP_URL}
        VITE_TOKEN_STORAGE_KEY: ${VITE_TOKEN_STORAGE_KEY}
        VITE_REFRESH_TOKEN_KEY: ${VITE_REFRESH_TOKEN_KEY}
    container_name: ecommerce_frontend
    restart: unless-stopped
    networks:
      - proxy-network       # Traefik's network — required for SSL and routing
      - e-commerce-network  # Backend network — required to reach Saleor/Shiprocket
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`store.leemasmart.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # Tell Traefik explicitly which network to use to reach this container
      - "traefik.docker.network=proxy-network"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy-network:
    external: true
    name: proxy-network
  e-commerce-network:
    external: true
    name: leemasmart-backend_leemasmart-network
